<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Mappa + Altimetria Dinamica</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

#map {
  height: 65vh;
}

#chart-container {
  height: 35vh;
  padding: 10px 20px;
  background: #fff;
}

canvas {
  width: 100% !important;
  height: 100% !important;
}
</style>
</head>

<body>

<div id="map"></div>
<div id="chart-container">
  <canvas id="elevationChart"></canvas>
</div>

<script>

let map = L.map('map',{
	minZoom:15,
	maxZoom:18}).setView([40.42, 15.23], 13);

const bounds = [
  [40.406862, 15.200811], // Sud-Ovest
  [40.437017, 15.264628]  // Nord-Est
];

map.setMaxBounds(bounds);
map.on('drag', function() {
  map.panInsideBounds(bounds, { animate: false });
});

const satellite = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
);

const osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
);


satellite.addTo(map);

L.control.layers({
  "Satellite": satellite,
  "OpenStreetMap": osm  
}).addTo(map);

let chart;
let marker;
let allPoints = [];
let latlngs = [];

// ==========================
// CARICAMENTO TRACCIATO
// ==========================
fetch('percorso1.geojson')
  .then(res => res.json())
  .then(data => {

    data.features.forEach(f => {
      f.geometry.coordinates.forEach(line => {
        line.forEach(p => {
          latlngs.push([p[1], p[0]]);
          allPoints.push({
            latlng: [p[1], p[0]],
            ele: p[2] || 0
          });
        });
      });
    });

    allPoints = allPoints.map((p, i) => ({
      ...p,
      index: i
    }));

    let polyline = L.polyline(latlngs, {
      color: "#cc0000",
      weight: 4
    }).addTo(map);

    map.fitBounds(polyline.getBounds());
	
	// ==========================
// DISTANZA PROGRESSIVA
// ==========================
	let distances = [0];
	
	for (let i = 1; i < allPoints.length; i++) {
		let d = map.distance(
			allPoints[i - 1].latlng,
			allPoints[i].latlng
		);
		
		distances.push(distances[i - 1] + d);
	}

    const elevations = allPoints.map(p => p.ele);

    const ctx = document.getElementById('elevationChart');

    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: distances.map(d => Math.round(d / 10) * 10),
        datasets: [{
          label: 'Altitudine',
          data: elevations,
          borderColor: '#2b7cff',
          backgroundColor: 'rgba(43,124,255,0.15)',
          fill: true,
          tension: 0.35,
          pointRadius: 0
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,

        interaction: {
          mode: 'index',
          intersect: false
        },

        plugins: {
          legend: {
            display: false
          }
        },

        scales: {
          x: {
            display: true,
			title:{
				display: true,
				text: "Distanza(m)"
			}
          }
        },

        onHover: (event, elements) => {

          if (!elements.length) return;

          let index = elements[0].index;
          let point = allPoints[index];

          if (marker) {
            map.removeLayer(marker);
          }

          marker = L.circleMarker(point.latlng, {
            radius: 7,
            color: "#00ecff",
            fillColor: "#00ecff",
            fillOpacity: 1
          }).addTo(map);

          map.panTo(point.latlng);
        }
      }
    });

    polyline.on("mousemove", function(e) {

      let minDist = Infinity;
      let closestIndex = 0;

      allPoints.forEach((p, i) => {

        let d = map.distance(
          e.latlng,
          L.latLng(p.latlng[0], p.latlng[1])
        );

        if (d < minDist) {
          minDist = d;
          closestIndex = i;
        }
      });

      chart.setActiveElements([
        {
          datasetIndex: 0,
          index: closestIndex
        }
      ]);

      chart.tooltip.setActiveElements([
        {
          datasetIndex: 0,
          index: closestIndex
        }
      ]);

      chart.update('none');

      if (marker) {
        map.removeLayer(marker);
      }

      marker = L.circleMarker(
        allPoints[closestIndex].latlng,
        {
          radius: 7,
          color: "#00ecff",
          fillColor: "#00ecff",
          fillOpacity: 1
        }
      ).addTo(map);
    });

  })
  .catch(err => console.error("Errore test.geojson:", err));


// ==========================
// CARICAMENTO PUNTI INTERESSE
// ==========================
/*
const icons = {
  chiesa: L.icon({
    iconUrl: 'assets/church.svg',
    iconSize: [25,25]
  }),
  museo: L.icon({
    iconUrl: 'assets/museum.svg',
    iconSize: [25,25]
  }),
  murales: L.icon({
    iconUrl: 'assets/painting.svg',
    iconSize: [25,25]
  }),
  mulino: L.icon({
    iconUrl: 'assets/watermill.svg',
    iconSize: [25,25]
  }),
  fontana: L.icon({
    iconUrl: 'assets/faucet.svg',
    iconSize: [25,25]
  }),
};*/

let poiLayer;

function getIcon(tipo) {

  let size;

  const zoom = map.getZoom();

  if (zoom <= 15) {
    size = 16;
  } else if (zoom <= 16) {
    size = 24;
  } else {
    size = 32;
  }

  const urls = {
    chiesa: 'assets/church.svg',
    mulino: 'assets/watermill.svg',
    museo: 'assets/museum.svg',
    murales: 'assets/painting.svg',
	fontana: 'assets/faucet.svg',
	ponte: 'assets/bridge.svg'
  };

  return L.icon({
    iconUrl: urls[tipo],
    iconSize: [size, size],
    iconAnchor: [size / 2, size],
    popupAnchor: [0, -size]
  });

}

fetch('punti1.geojson')
  .then(res => res.json())
  .then(data => {

    poiLayer = L.geoJSON(data, {

      pointToLayer: function(feature, latlng) {

        const tipo = feature.properties.tipo;

        return L.marker(latlng, {
          icon: getIcon(tipo)
        });

      },

      onEachFeature: function(feature, layer) {

        const nome = feature.properties.nome || "Punto";
        const descrizione = feature.properties.descrizione || "";

        layer.bindPopup(`
          <h3>${nome}</h3>
          <p>${descrizione}</p>
        `);

      }

    });
	poiLayer.addTo(map);

    // Mostra i POI solo se lo zoom è sufficientemente alto
    /*if (map.getZoom() >= 16) {
      poiLayer.addTo(map);
    }*/

  });
map.on('zoomend', function() {

  if (!poiLayer) return;

  poiLayer.eachLayer(function(layer) {

    const tipo = layer.feature.properties.tipo;

    layer.setIcon(
      getIcon(tipo)
    );

  });

});
</script>

</body>
</html>
